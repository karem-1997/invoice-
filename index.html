<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSE Accounting System</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    
    <style>
        :root { --main-color: #c5a021; --text-color: #1a1a1a; --border-color: #000; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; background: #f0f2f5; font-size: 13px; }
        .no-print { display: block; }
        .admin-panel { max-width: 1100px; margin: 10px auto; background: #fff; padding: 15px; border-radius: 12px; border-top: 5px solid var(--main-color); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
        .form-group { flex: 1; min-width: 180px; display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; margin-bottom: 4px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-save { background: #3498db; } .btn-add { background: #28a745; } .btn-print { background: #000; }
        .btn-edit-row { background: #f39c12; color: #fff; padding: 4px 8px; font-size: 10px; margin-left: 5px; }
        .btn-delete-row { background: #e74c3c; color: #fff; padding: 4px 8px; font-size: 10px; }
        
        /* الفاتورة */
        .invoice-card { width: 210mm; min-height: 280mm; margin: 20px auto; background: #fff; padding: 12mm; border: 1px solid #ddd; position: relative; }
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); width: 60%; opacity: 0.08; pointer-events: none; }
        .inv-header { display: flex; justify-content: space-between; border-bottom: 3px solid var(--main-color); padding-bottom: 15px; }
        .logo-box { flex: 1; text-align: left; }
        .logo-img { max-height: 90px; }
        .logo-text { font-size: 40px; font-weight: bold; color: var(--main-color); }
        .print-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .print-table th { background: #f2f2f2; border: 1px solid var(--border-color); padding: 8px; }
        .print-table td { border: 1px solid var(--border-color); padding: 8px; text-align: center; }
        @media print { .no-print { display: none !important; } .invoice-card { margin: 0; border: none; width: 100%; } }
    </style>
</head>
<body>

    <div class="admin-panel no-print">
        <h3>⚙️ إعدادات الهوية</h3>
        <div class="form-row">
            <div class="form-group"><label>الاسم (EN)</label><input type="text" id="set_en" oninput="sync()"></div>
            <div class="form-group"><label>الاسم (AR)</label><input type="text" id="set_ar" oninput="sync()"></div>
            <div class="form-group"><label>الرقم الضريبي</label><input type="text" id="set_trn" oninput="sync()"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>العنوان</label><input type="text" id="set_addr" oninput="sync()"></div>
            <div class="form-group"><label>الهاتف</label><input type="text" id="set_ph" oninput="sync()"></div>
            <div class="form-group"><label>نص الشعار</label><input type="text" id="set_l_txt" oninput="sync()"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>اللوجو</label><input type="file" onchange="uploadImg(this, 'logo')"></div>
            <div class="form-group"><label>العلامة المائية</label><input type="file" onchange="uploadImg(this, 'water')"></div>
        </div>
        <button class="btn btn-save" onclick="saveProfile()">💾 حفظ الهوية</button>
    </div>

    <div class="admin-panel no-print">
        <h3>📄 بيانات العميل والأصناف</h3>
        <div class="form-row">
            <div class="form-group"><label>العميل</label><input type="text" id="in_cust" oninput="sync()"></div>
            <div class="form-group"><label>هاتف العميل</label><input type="text" id="in_cust_ph" oninput="sync()"></div>
            <div class="form-group"><label>رقم الفاتورة</label><input type="text" id="in_no" readonly></div>
        </div>
        <div class="form-row" style="background:#f9f9f9; padding:10px;">
            <div class="form-group" style="flex:2"><label>الوصف</label><input type="text" id="p_desc"></div>
            <div class="form-group"><label>الكمية</label><input type="number" id="p_qty" value="1"></div>
            <div class="form-group"><label>السعر</label><input type="number" id="p_price"></div>
            <button class="btn btn-add" style="margin-top:20px;" onclick="addItem()">+ إضافة</button>
        </div>
        <table style="width:100%; border-collapse: collapse; margin-top:10px;" border="1">
            <thead><tr><th>الوصف</th><th>الكمية</th><th>السعر</th><th>إجراء</th></tr></thead>
            <tbody id="edit_body"></tbody>
        </table>
        <div class="form-row" style="margin-top:15px;">
            <button class="btn btn-save" onclick="saveInv()">☁️ حفظ الفاتورة</button>
            <button class="btn btn-print" onclick="window.print()">🖨️ طباعة</button>
        </div>
    </div>

    <div class="invoice-card" id="invoice">
        <img id="out_water" class="watermark">
        <div class="inv-header">
            <div class="logo-box" dir="ltr">
                <h1 id="out_en">COMPANY</h1>
                <p id="out_ar">الشركة</p>
                <p id="out_addr">Address</p>
                <p>TRN: <span id="out_trn">000</span> | Tel: <span id="out_ph">000</span></p>
            </div>
            <div style="text-align:right;">
                <span id="out_l_txt" class="logo-text">DSE</span>
                <img id="out_logo" class="logo-img" style="display:none;">
            </div>
        </div>
        <div style="text-align:center; margin:20px 0;"><h2>TAX INVOICE / فاتورة ضريبية</h2></div>
        <div style="display:flex; justify-content:space-between;">
            <div><strong>To:</strong> <span id="out_cust">...</span><br><strong>PH:</strong> <span id="out_cust_ph">...</span></div>
            <div dir="ltr"><strong>Inv:</strong> #<span id="out_no">000</span><br><strong>Date:</strong> <span id="out_date"></span></div>
        </div>
        <table class="print-table">
            <thead><tr><th>No.</th><th>Description</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead>
            <tbody id="out_body"></tbody>
        </table>
        <div style="margin-top:20px; float:left; width:30%;">
            <div style="display:flex; justify-content:space-between;"><span>Total:</span> <span id="total_val">0.00</span></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAOpqXo_wgCUGw_vUYAwepeHfkScqHdrc8", 
            databaseURL: "https://tax-invoice-2cb6d-default-rtdb.firebaseio.com",
            projectId: "tax-invoice-2cb6d" 
        };
        firebase.initializeApp(firebaseConfig); 
        const db = firebase.database();
        let items = []; let logo = ""; let water = "";

        function sync() {
            document.getElementById('out_en').innerText = document.getElementById('set_en').value;
            document.getElementById('out_ar').innerText = document.getElementById('set_ar').value;
            document.getElementById('out_trn').innerText = document.getElementById('set_trn').value;
            document.getElementById('out_addr').innerText = document.getElementById('set_addr').value;
            document.getElementById('out_ph').innerText = document.getElementById('set_ph').value;
            document.getElementById('out_l_txt').innerText = document.getElementById('set_l_txt').value || "DSE";
            document.getElementById('out_cust').innerText = document.getElementById('in_cust').value;
            document.getElementById('out_cust_ph').innerText = document.getElementById('in_cust_ph').value;
            document.getElementById('out_no').innerText = document.getElementById('in_no').value;
            document.getElementById('out_date').innerText = new Date().toLocaleDateString();
        }

        function uploadImg(input, type) {
            const reader = new FileReader();
            reader.onload = e => {
                if(type==='logo'){ logo=e.target.result; document.getElementById('out_logo').src=logo; document.getElementById('out_logo').style.display="block"; document.getElementById('out_l_txt').style.display="none"; }
                else { water=e.target.result; document.getElementById('out_water').src=water; }
            };
            reader.readAsDataURL(input.files[0]);
        }

        function saveProfile() {
            const p = { en:document.getElementById('set_en').value, ar:document.getElementById('set_ar').value, trn:document.getElementById('set_trn').value, addr:document.getElementById('set_addr').value, ph:document.getElementById('set_ph').value, ltxt:document.getElementById('set_l_txt').value, logo:logo, water:water };
            db.ref('profile').set(p).then(()=>alert("تم الحفظ"));
        }

        function addItem() {
            items.push({ desc: document.getElementById('p_desc').value, qty: document.getElementById('p_qty').value, price: document.getElementById('p_price').value });
            render();
            document.getElementById('p_desc').value=''; document.getElementById('p_price').value='';
        }

        function editRow(i) {
            const it = items[i];
            document.getElementById('p_desc').value = it.desc;
            document.getElementById('p_qty').value = it.qty;
            document.getElementById('p_price').value = it.price;
            items.splice(i, 1);
            render();
        }

        function render() {
            const eb = document.getElementById('edit_body'); const ob = document.getElementById('out_body');
            eb.innerHTML = ''; ob.innerHTML = ''; let total = 0;
            items.forEach((it, i) => {
                let rowTotal = it.qty * it.price; total += rowTotal;
                eb.innerHTML += `<tr><td>${it.desc}</td><td>${it.qty}</td><td>${it.price}</td><td><button class="btn btn-edit-row" onclick="editRow(${i})">✏️</button><button class="btn btn-delete-row" onclick="items.splice(${i},1);render()">🗑️</button></td></tr>`;
                ob.innerHTML += `<tr><td>${i+1}</td><td>${it.desc}</td><td>${it.qty}</td><td>${it.price}</td><td>${rowTotal.toFixed(2)}</td></tr>`;
            });
            document.getElementById('total_val').innerText = total.toFixed(2);
            sync();
        }

        function saveInv() {
            const id = document.getElementById('in_no').value;
            db.ref('invoices/' + id).set({ no:id, cust:document.getElementById('in_cust').value, cph:document.getElementById('in_cust_ph').value, items:items, total:document.getElementById('total_val').innerText }).then(()=>alert("تم الحفظ"));
        }

        window.onload = () => {
            db.ref('profile').once('value', s => {
                const d = s.val(); if(d){
                    document.getElementById('set_en').value=d.en; document.getElementById('set_ar').value=d.ar; document.getElementById('set_trn').value=d.trn; document.getElementById('set_addr').value=d.addr; document.getElementById('set_ph').value=d.ph; document.getElementById('set_l_txt').value=d.ltxt;
                    logo=d.logo; water=d.water; if(logo){ document.getElementById('out_logo').src=logo; document.getElementById('out_logo').style.display="block"; document.getElementById('out_l_txt').style.display="none"; } if(water) document.getElementById('out_water').src=water;
                    sync();
                }
            });
            db.ref('invoices').limitToLast(1).once('value', s => {
                let n = 1001; if(s.val()) n = parseInt(Object.keys(s.val())[0]) + 1;
                document.getElementById('in_no').value = n; sync();
            });
        };
    </script>
</body>
</html>
